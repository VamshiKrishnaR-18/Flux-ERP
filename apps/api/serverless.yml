service: flux-erp-api

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-2
  memorySize: 512
  timeout: 29
  environment:
    NODE_ENV: production
    MONGO_URI: ${env:MONGO_URI}
    JWT_SECRET: ${env:JWT_SECRET}
    CLERK_SECRET_KEY: ${env:CLERK_SECRET_KEY, ''}
    GROQ_API_KEY: ${env:GROQ_API_KEY, ''}
    SMTP_HOST: ${env:SMTP_HOST, 'smtp.ethereal.email'}
    SMTP_PORT: ${env:SMTP_PORT, '587'}
    SMTP_USER: ${env:SMTP_USER, ''}
    SMTP_PASS: ${env:SMTP_PASS, ''}
    CORS_ORIGIN: 'https://flux-erp-web.vercel.app'

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    external:
      - '@aws-sdk/*'

functions:
  api:
    handler: src/lambda.handler
    events:
      - http:
          path: /
          method: ANY
          cors:
            origins:
              - 'https://flux-erp-web.vercel.app'
              - 'http://localhost:5173'
              - 'http://localhost:3000'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - Accept
              - Origin
              - X-Demo-Mode
            allowCredentials: true
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origins:
              - 'https://flux-erp-web.vercel.app'
              - 'http://localhost:5173'
              - 'http://localhost:3000'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - Accept
              - Origin
              - X-Demo-Mode
            allowCredentials: true

plugins:
  - serverless-offline