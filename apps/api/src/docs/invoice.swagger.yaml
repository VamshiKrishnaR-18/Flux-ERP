paths:
  /api/v1/invoices:
    get:
      summary: Get all invoices
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: clientId
          schema:
            type: string
      responses:
        200:
          description: List of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
    post:
      summary: Create a new invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoice'
      responses:
        201:
          description: Invoice created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Invoice'

  /api/v1/invoices/export:
    get:
      summary: Export invoices to CSV
      tags: [Invoices]
      security:
        - bearerAuth: []
      responses:
        200:
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /api/v1/invoices/{id}:
    get:
      summary: Get a single invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Invoice details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Invoice'
    put:
      summary: Update an invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoice'
      responses:
        200:
          description: Invoice updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Invoice'
    delete:
      summary: Soft delete an invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Invoice deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/v1/invoices/{id}/payment:
    post:
      summary: Add payment to an invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
      responses:
        200:
          description: Payment recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Invoice'

components:
  schemas:
    InvoiceItem:
      type: object
      properties:
        productId:
          type: string
        itemName:
          type: string
        description:
          type: string
        quantity:
          type: number
        price:
          type: number
        total:
          type: number

    CreateInvoice:
      type: object
      required: [clientId, items]
      properties:
        clientId:
          type: string
        date:
          type: string
          format: date
        expiredDate:
          type: string
          format: date
        currency:
          type: string
          default: USD
        taxRate:
          type: number
        discount:
          type: number
        notes:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceItem'

    Invoice:
      allOf:
        - $ref: '#/components/schemas/CreateInvoice'
        - type: object
          properties:
            _id:
              type: string
            number:
              type: integer
            status:
              type: string
              enum: [draft, pending, sent, paid, overdue]
            paymentStatus:
              type: string
              enum: [unpaid, paid, partially]
            amountPaid:
              type: number
            subTotal:
              type: number
            taxTotal:
              type: number
            total:
              type: number
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    Pagination:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer