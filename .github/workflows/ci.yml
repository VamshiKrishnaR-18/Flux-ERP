name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # TEST & BUILD
  test-and-build:
    runs-on: ubuntu-latest
    
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Lint Code
      run: npx turbo run lint

    - name: Type Check
      run: npx turbo run check-types

    - name: Security Audit
      run: npm audit --audit-level=high || true

    - name: Build
      run: npx turbo run build

    - name: Create Test .env File
      run: |
        echo "MONGO_URI=mongodb://localhost:27017/flux-test-db" > apps/api/.env
        echo "JWT_SECRET=test_secret_for_ci_pipeline" >> apps/api/.env
        echo "NODE_ENV=test" >> apps/api/.env

    - name: Run API Tests
      run: npx turbo run test --filter=api

    - name: Run Web Tests
      run: npx turbo run test --filter=web